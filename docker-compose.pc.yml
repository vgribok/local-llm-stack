# Windows/PC overlay: dual-GPU Ollama backends (NVIDIA CUDA)
# Usage: docker compose -f docker-compose.yml -f docker-compose.pc.yml up -d

services:

  ollama-big:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3003:11434"
    volumes:
      # Private model store - prevents OWUI from routing small models here
      - C:/Users/vgrib/.ollama-big:/root/.ollama
    environment:
      # Pin to RTX 3090 Ti. Docker Desktop on Windows ignores NVIDIA_VISIBLE_DEVICES
      # filtering, so we restrict at the CUDA library level instead.
      - CUDA_VISIBLE_DEVICES=${BIG_GPU_ID}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=${BIG_CONTEXT_LENGTH:-48000}
    runtime: nvidia
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  ollama-small:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3004:11434"
    volumes:
      # Private model store - only contains task/embedding models
      - C:/Users/vgrib/.ollama-small:/root/.ollama
    environment:
      # Pin to RTX 5060 Ti. Docker Desktop on Windows ignores NVIDIA_VISIBLE_DEVICES
      # filtering, so we restrict at the CUDA library level instead.
      - CUDA_VISIBLE_DEVICES=${SMALL_GPU_ID}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=16384
    runtime: nvidia
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  think-router:
    ports:
      - "11434:11434"
    environment:
      - UPSTREAM_URL=http://ollama-big:11434
      - SMALL_UPSTREAM_URL=http://ollama-small:11434
      - CLASSIFIER_URL=http://ollama-small:11434
    depends_on:
      ollama-big:
        condition: service_healthy
      ollama-small:
        condition: service_healthy

  open-webui:
    environment:
      - RAG_OLLAMA_BASE_URL=http://ollama-small:11434
    depends_on:
      ollama-small:
        condition: service_healthy

networks:
  ai-net: