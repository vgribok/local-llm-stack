name: ai-stack

networks:
  ai-net:
    driver: bridge

services:

  think-router:
    build: ./think-router
    restart: unless-stopped
    networks:
      - ai-net
    # Port mapping overridden in platform-specific compose files
    environment:
      # URLs overridden in platform-specific compose files
      - UPSTREAM_URL=${UPSTREAM_URL:-http://ollama-big:11434}
      - SMALL_UPSTREAM_URL=${SMALL_UPSTREAM_URL:-http://ollama-small:11434}
      - CLASSIFIER_URL=${CLASSIFIER_URL:-http://ollama-small:11434}
      - CLASSIFIER_MODEL=granite4.1:3b
      - EXCLUDE_MODELS=
      - INCLUDE_MODELS=
      - ROUTER_DEBUG_DECISIONS=${ROUTER_DEBUG_DECISIONS:-1}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:11434/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3001:8080"
    volumes:
      - ./open-webui:/app/backend/data
      - ./patches/tavily.py:/app/backend/open_webui/retrieval/web/tavily.py:ro
    environment:
      # All model traffic goes through think-router
      - OLLAMA_BASE_URLS=http://think-router:11434
      # Web search via Tavily
      - ENABLE_WEB_SEARCH=True
      - WEB_SEARCH_ENGINE=tavily
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WEB_SEARCH_RESULT_COUNT=6
      - WEB_SEARCH_CONCURRENT_REQUESTS=5
      # RAG / embeddings - URL overridden in platform-specific compose files
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_OLLAMA_BASE_URL=${RAG_OLLAMA_BASE_URL:-http://ollama-small:11434}
      - ENABLE_RAG_HYBRID_SEARCH=True
      # Task model - small/fast dense instruct model
      - TASK_MODEL=granite4.1:3b
    depends_on:
      think-router:
        condition: service_healthy