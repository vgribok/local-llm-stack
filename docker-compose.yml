name: ai-stack

networks:
  ai-net:
    driver: bridge

services:

  ollama-big:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3003:11434"
    volumes:
      # Private model store - prevents OWUI from routing small models here
      - C:/Users/vgrib/.ollama-big:/root/.ollama
    environment:
      # Pin to RTX 3090 Ti. Docker Desktop on Windows ignores NVIDIA_VISIBLE_DEVICES
      # filtering, so we restrict at the CUDA library level instead.
      - CUDA_VISIBLE_DEVICES=GPU-c83aac7a-326c-d2ee-ecae-da8e6bf09cf8
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=${BIG_CONTEXT_LENGTH:-48000}
    runtime: nvidia
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  ollama-small:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3004:11434"
    volumes:
      # Private model store - only contains task/embedding models
      - C:/Users/vgrib/.ollama-small:/root/.ollama
    environment:
      # Pin to RTX 5060 Ti. Docker Desktop on Windows ignores NVIDIA_VISIBLE_DEVICES
      # filtering, so we restrict at the CUDA library level instead.
      - CUDA_VISIBLE_DEVICES=GPU-7fe8511c-b5dd-1309-e2e9-04c8b86be2fa
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=16384
    runtime: nvidia
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  think-router:
    build: ./think-router
    restart: unless-stopped
    networks:
      - ai-net
    environment:
      - UPSTREAM_URL=http://ollama-big:11434
      - CLASSIFIER_URL=http://ollama-small:11434
      - CLASSIFIER_MODEL=granite4.1:3b
      # Auto-discovery: router calls upstream /api/show on first use of each model
      # and classifies only if the model reports 'thinking' capability.
      # Optional comma-separated overrides:
      #   EXCLUDE_MODELS - never classify these (always keep thinking on)
      #   INCLUDE_MODELS - always classify these (force routing for non-thinking-capable)
      - EXCLUDE_MODELS=
      - INCLUDE_MODELS=
      # thinking_budget is not supported in Ollama. A concise-thinking instruction is injected
      # into the system message instead to soft-reduce thinking length (~50% fewer tokens).
      # Enables per-request routing decision and upstream timing logs.
      - ROUTER_DEBUG_DECISIONS=${ROUTER_DEBUG_DECISIONS:-1}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:11434/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      ollama-big:
        condition: service_healthy
      ollama-small:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "3001:8080"
    volumes:
      - ./open-webui:/app/backend/data
      - ./patches/tavily.py:/app/backend/open_webui/retrieval/web/tavily.py:ro
    environment:
      # Big-model traffic goes through think-router (auto-decides 'think' per request).
      # Small-model traffic goes direct to ollama-small.
      - OLLAMA_BASE_URLS=http://think-router:11434;http://ollama-small:11434
      # Web search via Tavily (API key in .env)
      - ENABLE_WEB_SEARCH=True
      - WEB_SEARCH_ENGINE=tavily
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WEB_SEARCH_RESULT_COUNT=6
      - WEB_SEARCH_CONCURRENT_REQUESTS=5
      # RAG / embeddings on GPU via Ollama (lives on ollama-small)
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_OLLAMA_BASE_URL=http://ollama-small:11434
      - ENABLE_RAG_HYBRID_SEARCH=True
      # Task model - small/fast dense instruct model (lives on ollama-small)
      - TASK_MODEL=granite4.1:3b
    depends_on:
      think-router:
        condition: service_healthy
      ollama-small:
        condition: service_healthy
